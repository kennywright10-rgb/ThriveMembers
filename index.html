<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrive 4 Peak Performance — Platinum Member Manager</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Thrive Brand Palette ── */
    --black: #111111;
    --charcoal: #1A1A1A;
    --charcoal-light: #242424;
    --charcoal-mid: #2E2E2E;
    --surface: #333333;
    --surface-light: #3D3D3D;
    --gold: #39B4E4;
    --gold-dark: #2A9BCB;
    --gold-glow: rgba(57, 180, 228, 0.12);
    --gold-glow-strong: rgba(57, 180, 228, 0.22);
    --white: #FFFFFF;
    --white-90: rgba(255,255,255,0.9);
    --white-70: rgba(255,255,255,0.7);
    --white-50: rgba(255,255,255,0.5);
    --white-30: rgba(255,255,255,0.3);
    --white-15: rgba(255,255,255,0.15);
    --white-08: rgba(255,255,255,0.08);
    --white-04: rgba(255,255,255,0.04);
    --danger: #E74C3C;
    --danger-dim: rgba(231,76,60,0.15);
    --success: #2ECC71;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* ═══════════════════ TOPBAR ═══════════════════ */
  .topbar {
    background: var(--charcoal);
    border-bottom: 1px solid var(--white-08);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 1rem;
  }
  .topbar-logo-img {
    height: 32px;
    width: auto;
    object-fit: contain;
    background: #fff;
    padding: 4px 12px;
    border-radius: 6px;
  }
  /* Fallback text logo if image not loaded */
  .topbar-logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem; font-weight: 700; color: var(--white);
    display: none;
  }
  .topbar-logo-text span { color: var(--gold); }
  .topbar-divider {
    width: 1px; height: 28px;
    background: var(--white-15);
  }
  .topbar-module {
    color: var(--gold);
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .topbar-time { color: var(--white-50); font-size: 0.8rem; }
  .topbar-count {
    background: var(--white-08);
    color: var(--white-70);
    padding: 0.3rem 0.8rem; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600;
  }

  /* ═══════════════════ APP LAYOUT ═══════════════════ */
  .app-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* ═══════════════════ SIDEBAR ═══════════════════ */
  .sidebar {
    background: var(--charcoal);
    border-right: 1px solid var(--white-08);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 1.2rem 1.1rem 0.8rem;
    border-bottom: 1px solid var(--white-08);
  }
  .sidebar-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 700; color: var(--white-90);
    margin-bottom: 0.7rem;
  }
  .search-box { position: relative; }
  .search-box input {
    width: 100%; padding: 0.55rem 0.9rem 0.55rem 2.2rem;
    border: 1px solid var(--white-15); border-radius: var(--radius-sm);
    font-family: inherit; font-size: 0.85rem; color: var(--white);
    background: var(--charcoal-light);
    transition: border var(--transition), box-shadow var(--transition);
    outline: none;
  }
  .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
  .search-box input::placeholder { color: var(--white-30); }
  .search-box svg {
    position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; stroke: var(--white-30); fill: none; stroke-width: 2;
  }

  .client-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
  .client-list::-webkit-scrollbar { width: 4px; }
  .client-list::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

  .client-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.65rem 1.1rem;
    cursor: pointer;
    transition: background var(--transition);
    border-left: 3px solid transparent;
  }
  .client-item:hover { background: var(--white-04); }
  .client-item.active {
    background: var(--gold-glow);
    border-left-color: var(--gold);
  }
  .client-item .avatar {
    width: 36px; height: 36px;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.82rem; font-weight: 700; color: var(--white-70);
    flex-shrink: 0;
    border: 1px solid var(--white-08);
  }
  .client-item.active .avatar {
    background: var(--gold);
    color: var(--charcoal);
    border-color: var(--gold);
  }
  .client-item-info { flex: 1; min-width: 0; }
  .client-item-name {
    font-size: 0.86rem; font-weight: 600; color: var(--white-90);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .client-item-meta {
    font-size: 0.72rem; color: var(--white-30);
    margin-top: 0.1rem;
  }
  .client-item-visits {
    font-size: 0.7rem; font-weight: 700; color: var(--gold);
    background: var(--gold-glow);
    padding: 0.15rem 0.5rem;
    border-radius: 10px; flex-shrink: 0;
  }

  .btn-new-client {
    margin: 0.8rem 1.1rem;
    padding: 0.65rem;
    background: var(--gold);
    color: var(--charcoal);
    border: none; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 0.85rem; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    transition: all var(--transition);
  }
  .btn-new-client:hover { background: var(--gold-dark); }
  .btn-new-client svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  /* ═══════════════════ MAIN PANEL ═══════════════════ */
  .main-panel {
    background: var(--black);
    padding: 2rem 2.5rem;
    overflow-y: auto;
  }

  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 60vh; text-align: center;
  }
  .empty-state .empty-icon {
    width: 80px; height: 80px;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.2rem;
    border: 1px solid var(--white-08);
  }
  .empty-state .empty-icon svg { width: 36px; height: 36px; stroke: var(--gold); fill: none; stroke-width: 1.5; }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--white-90);
    margin-bottom: 0.4rem;
  }
  .empty-state p { color: var(--white-50); font-size: 0.9rem; }

  /* ═══════════════════ CLIENT DETAIL ═══════════════════ */
  .client-detail { display: none; }
  .client-detail.active { display: block; }

  .detail-header {
    display: flex; align-items: flex-start; gap: 1.2rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--white-08);
  }
  .detail-avatar {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--charcoal);
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(200,168,76,0.3);
  }
  .detail-header-info { flex: 1; }
  .detail-header-info h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem; font-weight: 700; line-height: 1.15;
    color: var(--white);
  }
  .detail-header-actions { display: flex; gap: 0.5rem; }
  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--white-10, rgba(255,255,255,0.1));
    border-radius: var(--radius-sm); padding: 0.5rem;
    cursor: pointer; transition: all var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: var(--gold-glow); border-color: var(--gold); }
  .btn-icon svg { width: 16px; height: 16px; stroke: var(--white-50); fill: none; stroke-width: 2; }
  .btn-icon:hover svg { stroke: var(--gold); }
  .btn-icon.danger:hover { background: var(--danger-dim); border-color: var(--danger); }
  .btn-icon.danger:hover svg { stroke: var(--danger); }

  /* ── Fields ── */
  .fields-section { margin-bottom: 2rem; }
  .fields-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 700; color: var(--white-90);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .fields-section-title svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }
  .field-label {
    font-size: 0.68rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--white-30); margin-bottom: 0.35rem;
    display: block;
  }
  .field-display {
    padding: 0.6rem 0;
    font-size: 0.92rem; font-weight: 500;
    color: var(--white-90);
    border-bottom: 1px solid var(--white-08);
  }
  .field-input {
    width: 100%; padding: 0.6rem 0.85rem;
    border: 1px solid var(--white-15);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; color: var(--white);
    background: var(--charcoal-light);
    transition: all var(--transition); outline: none;
  }
  .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); background: var(--charcoal-mid); }
  .field-input::placeholder { color: var(--white-30); }

  /* ── Visit Tracker ── */
  .visit-section { margin-bottom: 2rem; }
  .visit-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.8rem;
  }
  .visit-count-badge {
    background: var(--gold);
    color: var(--charcoal);
    font-size: 0.75rem; font-weight: 800;
    padding: 0.2rem 0.7rem;
    border-radius: 20px;
  }
  .btn-add-visit {
    background: transparent;
    color: var(--gold); border: 1px solid var(--gold);
    padding: 0.4rem 0.9rem;
    border-radius: var(--radius-sm);
    font-family: inherit; font-size: 0.78rem; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.3rem;
    transition: all var(--transition);
  }
  .btn-add-visit:hover { background: var(--gold); color: var(--charcoal); }
  .btn-add-visit svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  .visit-list { list-style: none; }
  .visit-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--white-04);
    position: relative;
  }
  .visit-item:last-child { border-bottom: none; }
  .visit-num {
    width: 28px; height: 28px;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: var(--gold);
    flex-shrink: 0;
    border: 1px solid var(--white-08);
  }
  .visit-info { flex: 1; }
  .visit-date-text { font-size: 0.85rem; font-weight: 600; color: var(--white-90); }
  .visit-notes-text { font-size: 0.76rem; color: var(--white-30); margin-top: 0.1rem; }
  .visit-delete {
    opacity: 0; transition: opacity var(--transition);
    background: none; border: none; cursor: pointer; padding: 0.3rem;
  }
  .visit-item:hover .visit-delete { opacity: 1; }
  .visit-delete svg { width: 14px; height: 14px; stroke: var(--danger); fill: none; stroke-width: 2; }

  .visit-empty {
    text-align: center; padding: 1.5rem;
    color: var(--white-30); font-size: 0.85rem; font-style: italic;
  }

  /* ═══════════════════ MODAL ═══════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--charcoal);
    border: 1px solid var(--white-08);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 460px; max-width: 95vw;
    max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .modal-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--white-08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--white);
  }
  .modal-close {
    background: none; border: none; cursor: pointer; padding: 0.3rem;
  }
  .modal-close svg { width: 18px; height: 18px; stroke: var(--white-50); fill: none; stroke-width: 2; }
  .modal-close:hover svg { stroke: var(--white); }

  .modal-body { padding: 1.5rem; }
  .modal-body .field-group { margin-bottom: 0.9rem; }
  .modal-body .field-group:last-child { margin-bottom: 0; }

  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--white-08);
    display: flex; justify-content: flex-end; gap: 0.6rem;
  }
  .btn {
    padding: 0.55rem 1.2rem;
    border-radius: var(--radius-sm);
    font-family: inherit; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
    border: 1px solid var(--white-15);
  }
  .btn-cancel { background: var(--surface); color: var(--white-70); }
  .btn-cancel:hover { background: var(--surface-light); }
  .btn-save { background: var(--gold); color: var(--charcoal); border-color: var(--gold); font-weight: 700; }
  .btn-save:hover { background: var(--gold-dark); }
  .btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger-fill:hover { background: #C0392B; }

  .confirm-text {
    font-size: 0.92rem; color: var(--white-70);
    line-height: 1.5; text-align: center; padding: 0.5rem 0;
  }
  .confirm-text strong { color: var(--white); }

  /* ═══════════════════ RESPONSIVE ═══════════════════ */
  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 40vh; }
    .main-panel { padding: 1.2rem; }
    .field-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <!-- Logo: replace src with your actual logo file -->
    <img class="topbar-logo-img" src="/images/logo.png" alt="Thrive 4 Peak Performance"
         onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';">
    <div class="topbar-logo-text" id="fallbackLogo">Thrive <span>4</span> Peak Performance</div>
    <div class="topbar-divider"></div>
    <div class="topbar-module">Platinum Member Manager</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-count" id="clientCount">0 members</div>
    <div class="topbar-time" id="liveTime"></div>
  </div>
</div>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Platinum Members</h2>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="renderClientList()">
      </div>
    </div>
    <div class="client-list" id="clientList"></div>
    <button class="btn-new-client" onclick="openNewClientModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Member
    </button>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h3>Select a Member</h3>
      <p>Choose from the list or add a new platinum member.</p>
    </div>

    <div class="client-detail" id="clientDetail">
      <div class="detail-header">
        <div class="detail-avatar" id="detailAvatar"></div>
        <div class="detail-header-info">
          <h1 id="detailName"></h1>
        </div>
        <div class="detail-header-actions">
          <button class="btn-icon" onclick="openEditClientModal()" title="Edit member">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon danger" onclick="confirmDeleteClient()" title="Delete member">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <div class="fields-section">
        <div class="fields-section-title">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Member Information
        </div>
        <div class="field-grid" id="contactFields"></div>
      </div>

      <div class="visit-section">
        <div class="visit-header">
          <div class="fields-section-title" style="margin-bottom:0;">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Visit Tracker
            <span class="visit-count-badge" id="visitCountBadge">0</span>
          </div>
          <button class="btn-add-visit" onclick="openAddVisitModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Log Visit
          </button>
        </div>
        <ul class="visit-list" id="visitList"></ul>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: New / Edit Member -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="clientModalTitle">New Member</h3>
      <button class="modal-close" onclick="closeModal('clientModal')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">First Name *</label>
        <input class="field-input" id="modalFirstName" placeholder="e.g. Michelle">
      </div>
      <div class="field-group">
        <label class="field-label">Last Name *</label>
        <input class="field-input" id="modalLastName" placeholder="e.g. Richardson">
      </div>
      <div class="field-group">
        <label class="field-label">Phone Number</label>
        <input class="field-input" id="modalPhone" placeholder="(678) 555-0142" oninput="formatPhone(this)">
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="modalEmail" type="email" placeholder="michelle@gmail.com">
      </div>
      <div class="field-group">
        <label class="field-label">Birthday</label>
        <input class="field-input" id="modalBirthday" type="date">
      </div>
      <div class="field-group">
        <label class="field-label">Notes</label>
        <input class="field-input" id="modalNotes" placeholder="Preferences, referral source, allergies...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('clientModal')">Cancel</button>
      <button class="btn btn-save" id="clientModalSave" onclick="saveClient()">Save Member</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Visit -->
<div class="modal-overlay" id="visitModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Log Visit</h3>
      <button class="modal-close" onclick="closeModal('visitModal')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Visit Date *</label>
        <input class="field-input" id="visitDate" type="date">
      </div>
      <div class="field-group">
        <label class="field-label">Service / Notes</label>
        <input class="field-input" id="visitNotes" placeholder="e.g. NAD+ IV Infusion, Cryotherapy session...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('visitModal')">Cancel</button>
      <button class="btn btn-save" onclick="saveVisit()">Log Visit</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Delete -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="width:380px;">
    <div class="modal-header">
      <h3>Delete Member</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="confirm-text">Are you sure you want to delete <strong id="deleteClientName"></strong>? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn btn-danger-fill" onclick="deleteClient()">Delete</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════ DATABASE (IndexedDB) ═══════════════════
const DB_NAME = 'ThrivePlatinumDB';
const DB_VERSION = 1;
let db;
let clients = [];
let selectedClientId = null;
let editingClientId = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('clients')) {
        d.createObjectStore('clients', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('clients', 'readonly');
    const store = tx.objectStore('clients');
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbPut(client) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('clients', 'readwrite');
    const store = tx.objectStore('clients');
    const req = store.put(client);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('clients', 'readwrite');
    const store = tx.objectStore('clients');
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}

// ═══════════════════ INIT ═══════════════════
async function init() {
  await openDB();
  clients = await dbGetAll();

  if (clients.length === 0) {
    const demo = [
      { id: genId(), firstName: 'Michelle', lastName: 'Richardson', phone: '(678) 555-0142', email: 'michelle.r@gmail.com', birthday: '1982-04-18', notes: 'Prefers left arm for IV. Interested in longevity panel.', visits: [
        { id: genId(), date: '2026-02-22', notes: 'NAD+ IV Infusion (500mg)' },
        { id: genId(), date: '2026-02-08', notes: 'Hormone Panel + Optimization' },
        { id: genId(), date: '2026-01-25', notes: 'GLP-1 Injection + Check-in' },
        { id: genId(), date: '2026-01-10', notes: 'IV Vitamin Drip — Recovery Blend' },
      ], createdAt: Date.now() },
      { id: genId(), firstName: 'David', lastName: 'Chen', phone: '(470) 555-0198', email: 'david.chen@outlook.com', birthday: '1975-11-02', notes: 'Referred by Dr. Marshall. HSA payment.', visits: [
        { id: genId(), date: '2026-03-01', notes: 'Peptide Therapy — BPC-157' },
        { id: genId(), date: '2026-02-15', notes: 'IV NAD+ 250mg' },
      ], createdAt: Date.now() },
      { id: genId(), firstName: 'Sarah', lastName: 'Patterson', phone: '(678) 555-0276', email: 'spatterson@gmail.com', birthday: '1990-07-14', notes: 'New member. Interested in GLP-1 weight management.', visits: [
        { id: genId(), date: '2026-03-05', notes: 'Initial Consultation' },
      ], createdAt: Date.now() },
    ];
    for (const c of demo) await dbPut(c);
    clients = demo;
  }

  clients.sort((a, b) => a.lastName.localeCompare(b.lastName));
  renderClientList();
  updateClock();
  setInterval(updateClock, 30000);
}

// ═══════════════════ HELPERS ═══════════════════
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function getInitials(f, l) { return ((f?.[0] || '') + (l?.[0] || '')).toUpperCase(); }

function formatDateDisplay(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatPhone(el) {
  let v = el.value.replace(/\D/g, '');
  if (v.length > 10) v = v.slice(0, 10);
  if (v.length >= 6) v = '(' + v.slice(0,3) + ') ' + v.slice(3,6) + '-' + v.slice(6);
  else if (v.length >= 3) v = '(' + v.slice(0,3) + ') ' + v.slice(3);
  el.value = v;
}

function updateClock() {
  const now = new Date();
  document.getElementById('liveTime').textContent = now.toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

function updateClientCount() {
  document.getElementById('clientCount').textContent = clients.length + ' member' + (clients.length !== 1 ? 's' : '');
}

function getBirthdayNote(bday) {
  if (!bday) return '';
  const today = new Date();
  const bd = new Date(bday + 'T00:00:00');
  const thisYear = new Date(today.getFullYear(), bd.getMonth(), bd.getDate());
  const diff = Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24));
  if (diff === 0) return ' <span style="color:var(--gold);font-weight:700;font-size:0.78rem;margin-left:0.5rem;">&#127874; TODAY!</span>';
  if (diff > 0 && diff <= 14) return ` <span style="color:var(--gold);font-size:0.78rem;margin-left:0.5rem;">in ${diff} days</span>`;
  return '';
}

// ═══════════════════ RENDER CLIENT LIST ═══════════════════
function renderClientList() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('clientList');

  let filtered = clients;
  if (search) {
    filtered = clients.filter(c =>
      (c.firstName + ' ' + c.lastName).toLowerCase().includes(search) ||
      (c.phone || '').includes(search)
    );
  }

  list.innerHTML = filtered.map(c => {
    const isActive = c.id === selectedClientId;
    const visitCount = (c.visits || []).length;
    return `
      <div class="client-item ${isActive ? 'active' : ''}" onclick="selectClient('${c.id}')">
        <div class="avatar">${getInitials(c.firstName, c.lastName)}</div>
        <div class="client-item-info">
          <div class="client-item-name">${c.firstName} ${c.lastName}</div>
          <div class="client-item-meta">${c.phone || 'No phone'}</div>
        </div>
        <div class="client-item-visits">${visitCount}</div>
      </div>
    `;
  }).join('');

  updateClientCount();
}

// ═══════════════════ SELECT CLIENT ═══════════════════
function selectClient(id) {
  selectedClientId = id;
  const c = clients.find(cl => cl.id === id);
  if (!c) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('clientDetail').classList.add('active');

  document.getElementById('detailAvatar').textContent = getInitials(c.firstName, c.lastName);
  document.getElementById('detailName').textContent = c.firstName + ' ' + c.lastName;

  document.getElementById('contactFields').innerHTML = `
    <div class="field-group">
      <span class="field-label">Phone</span>
      <div class="field-display">${c.phone || '—'}</div>
    </div>
    <div class="field-group">
      <span class="field-label">Email</span>
      <div class="field-display">${c.email || '—'}</div>
    </div>
    <div class="field-group">
      <span class="field-label">Birthday</span>
      <div class="field-display">${formatDateDisplay(c.birthday)}${getBirthdayNote(c.birthday)}</div>
    </div>
    <div class="field-group">
      <span class="field-label">Notes</span>
      <div class="field-display">${c.notes || '—'}</div>
    </div>
  `;

  renderVisits(c);
  renderClientList();
}

function renderVisits(c) {
  const visits = (c.visits || []).sort((a, b) => b.date.localeCompare(a.date));
  document.getElementById('visitCountBadge').textContent = visits.length;

  const list = document.getElementById('visitList');
  if (visits.length === 0) {
    list.innerHTML = '<div class="visit-empty">No visits recorded yet.</div>';
    return;
  }

  list.innerHTML = visits.map((v, i) => `
    <li class="visit-item">
      <div class="visit-num">${visits.length - i}</div>
      <div class="visit-info">
        <div class="visit-date-text">${formatDateDisplay(v.date)}</div>
        ${v.notes ? `<div class="visit-notes-text">${v.notes}</div>` : ''}
      </div>
      <button class="visit-delete" onclick="deleteVisit('${v.id}')" title="Remove visit">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </li>
  `).join('');
}

// ═══════════════════ MODALS ═══════════════════
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function openNewClientModal() {
  editingClientId = null;
  document.getElementById('clientModalTitle').textContent = 'New Member';
  document.getElementById('clientModalSave').textContent = 'Create Member';
  document.getElementById('modalFirstName').value = '';
  document.getElementById('modalLastName').value = '';
  document.getElementById('modalPhone').value = '';
  document.getElementById('modalEmail').value = '';
  document.getElementById('modalBirthday').value = '';
  document.getElementById('modalNotes').value = '';
  document.getElementById('clientModal').classList.add('show');
  setTimeout(() => document.getElementById('modalFirstName').focus(), 100);
}

function openEditClientModal() {
  const c = clients.find(cl => cl.id === selectedClientId);
  if (!c) return;
  editingClientId = c.id;
  document.getElementById('clientModalTitle').textContent = 'Edit Member';
  document.getElementById('clientModalSave').textContent = 'Save Changes';
  document.getElementById('modalFirstName').value = c.firstName || '';
  document.getElementById('modalLastName').value = c.lastName || '';
  document.getElementById('modalPhone').value = c.phone || '';
  document.getElementById('modalEmail').value = c.email || '';
  document.getElementById('modalBirthday').value = c.birthday || '';
  document.getElementById('modalNotes').value = c.notes || '';
  document.getElementById('clientModal').classList.add('show');
  setTimeout(() => document.getElementById('modalFirstName').focus(), 100);
}

async function saveClient() {
  const first = document.getElementById('modalFirstName').value.trim();
  const last = document.getElementById('modalLastName').value.trim();
  if (!first || !last) { alert('First and last name are required.'); return; }

  const phone = document.getElementById('modalPhone').value.trim();
  const email = document.getElementById('modalEmail').value.trim();
  const birthday = document.getElementById('modalBirthday').value;
  const notes = document.getElementById('modalNotes').value.trim();

  if (editingClientId) {
    const c = clients.find(cl => cl.id === editingClientId);
    if (c) {
      c.firstName = first; c.lastName = last;
      c.phone = phone; c.email = email;
      c.birthday = birthday; c.notes = notes;
      await dbPut(c);
    }
  } else {
    const newClient = {
      id: genId(), firstName: first, lastName: last,
      phone, email, birthday, notes,
      visits: [], createdAt: Date.now()
    };
    clients.push(newClient);
    await dbPut(newClient);
    selectedClientId = newClient.id;
  }

  clients.sort((a, b) => a.lastName.localeCompare(b.lastName));
  renderClientList();
  if (selectedClientId) selectClient(selectedClientId);
  closeModal('clientModal');
}

function confirmDeleteClient() {
  const c = clients.find(cl => cl.id === selectedClientId);
  if (!c) return;
  document.getElementById('deleteClientName').textContent = c.firstName + ' ' + c.lastName;
  document.getElementById('deleteModal').classList.add('show');
}

async function deleteClient() {
  if (!selectedClientId) return;
  await dbDelete(selectedClientId);
  clients = clients.filter(c => c.id !== selectedClientId);
  selectedClientId = null;
  document.getElementById('clientDetail').classList.remove('active');
  document.getElementById('emptyState').style.display = '';
  renderClientList();
  closeModal('deleteModal');
}

// ═══════════════════ VISITS ═══════════════════
function openAddVisitModal() {
  document.getElementById('visitDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('visitNotes').value = '';
  document.getElementById('visitModal').classList.add('show');
  setTimeout(() => document.getElementById('visitNotes').focus(), 100);
}

async function saveVisit() {
  const date = document.getElementById('visitDate').value;
  if (!date) { alert('Please select a date.'); return; }
  const notes = document.getElementById('visitNotes').value.trim();

  const c = clients.find(cl => cl.id === selectedClientId);
  if (!c) return;
  if (!c.visits) c.visits = [];
  c.visits.push({ id: genId(), date, notes });
  await dbPut(c);
  renderVisits(c);
  renderClientList();
  closeModal('visitModal');
}

async function deleteVisit(visitId) {
  const c = clients.find(cl => cl.id === selectedClientId);
  if (!c) return;
  c.visits = (c.visits || []).filter(v => v.id !== visitId);
  await dbPut(c);
  renderVisits(c);
  renderClientList();
}

// ═══════════════════ KEYBOARD ═══════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
  }
});

// ═══════════════════ START ═══════════════════
init();
</script>
</body>
</html>
